server:
  port: ${PORT:8080}

spring:
  application:
    name: smstar-backend

  # ===== MySQL =====
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/smstar?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:smstar_user}
    password: ${DB_PASSWORD:Smstar@2024}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # ===== Flyway =====
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ===== File Upload =====
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 55MB

# ===== JWT =====
jwt:
  secret: ${JWT_SECRET:smstar-super-secret-key-change-this-in-production-must-be-256-bits-long}
  expiration-ms: 86400000        # 24 hours
  refresh-expiration-ms: 604800000  # 7 days

# ===== Oracle OCI Object Storage =====
oracle:
  oci:
    config-file: ~/.oci/config
    profile: DEFAULT
    namespace: ${OCI_NAMESPACE:your-oci-namespace}
    bucket-name: ${OCI_BUCKET:smstar-media}
    region: ap-mumbai-1

# ===== CORS =====
cors:
  allowed-origins:
    - "http://localhost:5173"
    - "http://localhost:3000"
    - "${FRONTEND_URL:https://saimstar.lovable.app}"

# ===== Logging =====
logging:
  level:
    com.smstar: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
